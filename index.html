<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Задание на внимание</title>

  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe@0.4"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Fraunces:opsz,wght@9..144,300;9..144,500&display=swap');

    .jspsych-content {
      font-family: 'DM Mono', monospace;
      max-width: 600px;
    }

    .instructions {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      color: #2a2a2a;
      font-size: 20px;
      line-height: 1.6;
      text-align: center;
      padding: 40px 20px;
    }
    .instructions h1 { font-size: 32px; margin-bottom: 24px; font-weight: 500; }
    .instructions p { margin-bottom: 16px; }
    .instructions .subtle { font-size: 14px; color: #999; font-family: 'DM Mono', monospace; }

    /* Task */
    .task-wrapper {
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; padding: 16px 20px;
      user-select: none; -webkit-user-select: none;
    }

    .task-instruction {
      font-family: 'Fraunces', serif;
      font-size: 14px;
      font-weight: 300;
      color: #888;
      text-align: center;
      max-width: 360px;
      line-height: 1.5;
    }

    /* Countdown timer */
    .task-timer-bar {
      width: 100%; max-width: 360px; height: 4px;
      background: #eee; border-radius: 2px; overflow: hidden;
    }
    .task-timer-fill {
      height: 100%; background: #4A7AB5;
      border-radius: 2px; transition: width 1s linear;
    }
    .task-timer-text {
      font-size: 16px;
      font-family: 'DM Mono', monospace;
      color: #4A7AB5;
      font-weight: 400;
    }

    /* Grid */
    .circle-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 16px; width: 100%; max-width: 360px;
    }
    .circle-cell {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }

    .circle-btn {
      position: relative; width: 72px; height: 72px;
      border: none; background: none; padding: 0;
      -webkit-tap-highlight-color: transparent; outline: none;
      cursor: default;
      transition: transform 0.15s ease;
    }
    .circle-btn.active { cursor: pointer; }
    .circle-btn.active:active { transform: scale(0.95); }

    /* The disk */
    .disk {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 4px auto 0;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.3s ease, background 0.3s ease;
    }

    /* Inactive (dim) */
    .disk.inactive {
      background: #B0C4DE;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    /* Active (highlighted) */
    .disk.active {
      background: #3B7DD8;
      box-shadow: 0 0 0 4px rgba(59,125,216,0.25), 0 4px 16px rgba(59,125,216,0.3);
    }

    /* Done */
    .disk.done {
      background: #A8B8C8;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      opacity: 0.5;
    }

    /* Arrow inside the disk */
    .arrow-svg {
      width: 28px; height: 28px;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .arrow-svg path {
      fill: rgba(255,255,255,0.9);
    }
    .disk.inactive .arrow-svg path { fill: rgba(255,255,255,0.5); }
    .disk.done .arrow-svg path { fill: rgba(255,255,255,0.4); }

    .circle-label { font-size: 11px; color: #aaa; height: 14px; }

    /* Round counter */
    .round-info {
      font-size: 13px;
      color: #999;
      font-family: 'DM Mono', monospace;
    }

    /* End screen */
    .end-screen {
      font-family: 'Fraunces', serif; text-align: center; padding: 40px 20px;
    }
    .end-screen h1 { font-size: 32px; font-weight: 300; margin-bottom: 24px; color: #2a2a2a; }
    .end-screen .stat {
      font-family: 'DM Mono', monospace; font-size: 14px;
      color: #777; margin-bottom: 8px;
    }
    .end-screen .stat strong { color: #2a2a2a; font-weight: 400; }

    /* Pulse animation for active disk */
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(59,125,216,0.25), 0 4px 16px rgba(59,125,216,0.3); }
      50% { box-shadow: 0 0 0 6px rgba(59,125,216,0.15), 0 4px 20px rgba(59,125,216,0.25); }
    }
    .disk.active { animation: pulse 2s ease-in-out infinite; }
  </style>
</head>
<body></body>
<script>

/* ═══════════════════════════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════════════════════════ */

var DATAPIPE_EXPERIMENT_ID = "9ba4v";
var TASK_DURATION_MS = 5 * 60 * 1000; // 5 minutes

/* ═══════════════════════════════════════════════════════════════
   CUSTOM PLUGIN: circle-rotation (sequential version)
   ═══════════════════════════════════════════════════════════════ */

var jsPsychCircleRotation = (function () {

  var TOTAL_CIRCLES = 8;
  var CLICKS_PER_CIRCLE = 4; // 4 × 90° = 360°

  // SVG arrow pointing up
  var ARROW_SVG = '<svg class="arrow-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
    '<path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>' +
    '</svg>';

  var info = {
    name: "circle-rotation",
    parameters: {
      task_duration_ms: { type: 1, default: 300000 }
    }
  };

  class CircleRotationPlugin {
    constructor(jsPsych) { this.jsPsych = jsPsych; }

    trial(display_element, trial) {
      var self = this;

      // State
      var circles = [];
      for (var i = 0; i < TOTAL_CIRCLES; i++) circles.push(0);
      var activeIndex = 0;        // which disk is currently highlighted
      var roundsCompleted = 0;
      var totalClicks = 0;
      var startTime = performance.now();
      var roundTimestamps = [];

      function elapsed() { return performance.now() - startTime; }
      function remaining() { return Math.max(0, trial.task_duration_ms - elapsed()); }

      function formatTime(ms) {
        var s = Math.ceil(ms / 1000);
        var m = Math.floor(s / 60);
        var sec = s % 60;
        return m + ":" + (sec < 10 ? "0" : "") + sec;
      }

      function render() {
        var rem = remaining();
        var pct = (rem / trial.task_duration_ms) * 100;

        var html = '<div class="task-wrapper">';

        // Timer
        html += '<div style="display:flex; align-items:center; gap:12px; width:100%; max-width:360px;">' +
          '<div class="task-timer-bar"><div class="task-timer-fill" style="width:' + pct + '%"></div></div>' +
          '<span class="task-timer-text" id="crt-timer">' + formatTime(rem) + '</span></div>';

        // Round counter
        html += '<p class="round-info">раунд ' + (roundsCompleted + 1) + '</p>';

        // Grid
        html += '<div class="circle-grid">';
        for (var i = 0; i < TOTAL_CIRCLES; i++) {
          var clicks = circles[i];
          var done = clicks >= CLICKS_PER_CIRCLE;
          var isActive = (i === activeIndex && !done);
          var rotation = clicks * 90;

          var diskClass = done ? 'disk done' : (isActive ? 'disk active' : 'disk inactive');
          var btnClass = isActive ? 'circle-btn active' : 'circle-btn';

          html += '<div class="circle-cell">' +
            '<button class="' + btnClass + '" data-index="' + i + '"' +
            (!isActive ? ' disabled' : '') + '>' +
            '<div class="' + diskClass + '">' +
            '<div style="transform:rotate(' + rotation + 'deg); transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1)">' +
            ARROW_SVG + '</div>' +
            '</div></button>' +
            '<span class="circle-label">' + (done ? '✓' : isActive ? (clicks + '/4') : '') + '</span>' +
            '</div>';
        }
        html += '</div>';

        html += '</div>';
        display_element.innerHTML = html;

        // Attach click handler to active button
        var activeBtn = display_element.querySelector('.circle-btn.active');
        if (activeBtn) {
          activeBtn.addEventListener('click', handleClick);
        }
      }

      function handleClick(e) {
        var idx = parseInt(e.currentTarget.getAttribute('data-index'));
        if (idx !== activeIndex) return;

        circles[idx]++;
        totalClicks++;

        // Check if this disk is done
        if (circles[idx] >= CLICKS_PER_CIRCLE) {
          // Move to next disk
          activeIndex++;

          // Check if all 8 are done → round complete
          if (activeIndex >= TOTAL_CIRCLES) {
            roundsCompleted++;
            roundTimestamps.push(Math.round(elapsed()));

            // Reset for next round
            for (var i = 0; i < TOTAL_CIRCLES; i++) circles[i] = 0;
            activeIndex = 0;
          }
        }

        render();
      }

      function endTask() {
        clearInterval(timerInterval);

        var totalTime = Math.round(elapsed());
        self.jsPsych.finishTrial({
          rounds_completed: roundsCompleted,
          total_clicks: totalClicks,
          total_time_ms: totalTime,
          total_time_formatted: formatTime(0), // shows 0:00 since time ran out
          actual_duration_formatted: formatTime(totalTime * 1000).replace(/^0:/, ''),
          round_timestamps_ms: JSON.stringify(roundTimestamps)
        });
      }

      // Update timer every second
      var timerInterval = setInterval(function () {
        var rem = remaining();
        var el = display_element.querySelector('#crt-timer');
        if (el) el.textContent = formatTime(rem);

        // Update timer bar
        var bar = display_element.querySelector('.task-timer-fill');
        if (bar) bar.style.width = ((rem / trial.task_duration_ms) * 100) + '%';

        if (rem <= 0) {
          endTask();
        }
      }, 1000);

      // Hard stop at exact duration
      setTimeout(function () {
        endTask();
      }, trial.task_duration_ms + 500);

      render();
    }
  }

  CircleRotationPlugin.info = info;
  return CircleRotationPlugin;
})();


/* ═══════════════════════════════════════════════════════════════
   EXPERIMENT TIMELINE
   ═══════════════════════════════════════════════════════════════ */

var jsPsych = initJsPsych();
var subject_id = jsPsych.randomization.randomID(10);
var filename = subject_id + ".csv";

/* ── 1. Instructions ── */
var welcome = {
  type: jsPsychHtmlButtonResponse,
  stimulus:
    '<div class="instructions">' +
    '<h1>Задание на внимание</h1>' +
    '<p>Перед вами восемь синих дисков со стрелками.</p>' +
    '<p>Кликайте на подсвеченный диск. Каждый клик поворачивает стрелку на четверть оборота. ' +
    'После полного оборота (4 клика) подсветка переходит к следующему диску.</p>' +
    '<p>Работайте как можно быстрее. Задание длится 5 минут.</p>' +
    '<p class="subtle">Нажмите «Начать», когда будете готовы.</p>' +
    '</div>',
  choices: ['Начать']
};

/* ── 2. Task (5 min) ── */
var circleTask = {
  type: jsPsychCircleRotation,
  task_duration_ms: TASK_DURATION_MS
};

/* ── 3. Save data to OSF via DataPipe ── */
var save_data = {
  type: jsPsychPipe,
  action: "save",
  experiment_id: DATAPIPE_EXPERIMENT_ID,
  filename: filename,
  data_string: function () { return jsPsych.data.get().csv(); }
};

/* ── 4. End screen ── */
var debrief = {
  type: jsPsychHtmlButtonResponse,
  stimulus: function () {
    var data = jsPsych.data.get().filter({ trial_type: 'circle-rotation' }).values()[0];
    return '<div class="end-screen">' +
      '<h1>Время вышло!</h1>' +
      '<p class="stat">Раундов завершено: <strong>' + data.rounds_completed + '</strong></p>' +
      '<p class="stat">Всего кликов: <strong>' + data.total_clicks + '</strong></p>' +
      '<p class="stat" style="margin-top:24px; color:#bbb;">Спасибо за участие.</p>' +
      '</div>';
  },
  choices: ['Закрыть']
};

/* ── Run ── */
jsPsych.run([welcome, circleTask, save_data, debrief]);

</script>
</html>
