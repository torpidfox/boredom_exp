<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>Исследование</title>

  <!-- DataPipe -->
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe@0.4"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Fraunces:opsz,wght@9..144,300;9..144,500&display=swap');

    body { background: #fafafa; touch-action: manipulation; }
    * { touch-action: manipulation; }

    .jspsych-display-element {
      overflow-y: auto !important;
    }

    .jspsych-content {
      font-family: 'DM Mono', monospace;
      max-width: 700px;
    }

    /* Shared page styles */
    .page {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      color: #2a2a2a;
      font-size: 18px;
      line-height: 1.7;
      text-align: left;
      padding: 30px 20px;
      max-width: 620px;

    }

    .page p { margin-bottom: 14px; }
    .page ul { margin: 10px 0 14px 20px; }
    .page li { margin-bottom: 6px; }
    .page .note { font-size: 14px; color: #888; font-family: 'DM Mono', monospace; }

    /* Survey styling overrides */

    .jspsych-survey-likert-opts li {
      width: 100% !important;
      text-align: left !important;
      padding: 6px 12px !important;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .jspsych-survey-likert-opts li:hover {
      background: rgba(0,0,0,0.03);
    }
    .jspsych-survey-likert-opt-label {
      font-size: 14px !important;
      display: flex !important;
      align-items: center !important;
      gap: 8px !important;
      cursor: pointer;
      min-height: 24px !important; /* Гарантируем высоту строки */
      line-height: 1.5 !important;
    }
    .jspsych-survey-likert-opt-label input[type="radio"] {
      margin: 0 !important;
      flex-shrink: 0;

      font-size: 16px !important;

      font-family: 'Fraunces', serif !important;
    }

      font-size: 13px !important;

    }

    .jspsych-survey-multi-choice-question { 
      font-size: 16px !important; 
      font-family: 'Fraunces', serif !important;
    }
    .jspsych-survey-multi-choice-option {

      font-family: 'DM Mono', monospace !important;
    }

    .jspsych-survey-text .jspsych-survey-text-question p {
      font-family: 'Fraunces', serif !important;
      font-size: 16px !important;
    }

    #jspsych-survey-html-form input[type="number"] {
      width: 80px; padding: 6px 10px; font-size: 16px;
      border: 1px solid #ccc; border-radius: 4px;
      font-family: 'DM Mono', monospace;
    }

    .jspsych-btn {
      font-family: 'DM Mono', monospace !important;
      font-size: 14px !important;
    }

    /* Task styles */
    .task-wrapper {
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; padding: 16px 20px;
      user-select: none; -webkit-user-select: none;
    }
    .task-timer-bar {
      width: 100%; max-width: 360px; height: 4px;
      background: #eee; border-radius: 2px; overflow: hidden;
    }
    .task-timer-fill {
      height: 100%; background: #4A7AB5;
      border-radius: 2px; transition: width 1s linear;
    }
    .task-timer-text {
      font-size: 16px; font-family: 'DM Mono', monospace;
      color: #4A7AB5; font-weight: 400;
    }
    .circle-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 16px; width: 100%; max-width: 360px;
    }
    .circle-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .circle-btn {
      position: relative; width: 72px; height: 72px;
      border: none; background: none; padding: 0;
      -webkit-tap-highlight-color: transparent; outline: none; cursor: default;
      transition: transform 0.15s ease;
    }
    .circle-btn.active { cursor: pointer; }
    .circle-btn.active:active { transform: scale(0.95); }
    .disk {
      width: 64px; height: 64px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 4px auto 0;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.3s ease, background 0.3s ease;
    }
    .disk.inactive { background: #B0C4DE; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    .disk.active { background: #3B7DD8; box-shadow: 0 0 0 4px rgba(59,125,216,0.25), 0 4px 16px rgba(59,125,216,0.3); }
    .disk.done { background: #A8B8C8; box-shadow: 0 1px 4px rgba(0,0,0,0.06); opacity: 0.5; }
    .arrow-svg { width: 28px; height: 28px; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); }
    .arrow-svg path { fill: rgba(255,255,255,0.9); }
    .disk.inactive .arrow-svg path { fill: rgba(255,255,255,0.5); }
    .disk.done .arrow-svg path { fill: rgba(255,255,255,0.4); }
    .circle-label { font-size: 11px; color: #aaa; height: 14px; }
    .round-info { font-size: 13px; color: #999; font-family: 'DM Mono', monospace; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(59,125,216,0.25), 0 4px 16px rgba(59,125,216,0.3); }
      50% { box-shadow: 0 0 0 6px rgba(59,125,216,0.15), 0 4px 20px rgba(59,125,216,0.25); }
    }
    .disk.active { animation: pulse 2s ease-in-out infinite; }

    .end-screen {
      font-family: 'Fraunces', serif; text-align: center; padding: 40px 20px;
      max-width: 600px; margin: 0 auto;
    }
    .end-screen h1 { font-size: 28px; font-weight: 300; margin-bottom: 20px; color: #2a2a2a; }
    .end-screen p { font-size: 16px; color: #555; line-height: 1.7; margin-bottom: 12px; }
  </style>
</head>

<script>

/* ═══════════════════════════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════════════════════════ */
var DATAPIPE_EXPERIMENT_ID = "PgUsKMpOuZGD";
var TASK_DURATION_MS = 5 * 60 * 1000;

/* ═══════════════════════════════════════════════════════════════
   CIRCLE ROTATION PLUGIN (sequential)
   ═══════════════════════════════════════════════════════════════ */
var jsPsychCircleRotation = (function () {
  var TOTAL = 8, CLICKS = 4;
  var ARROW = '<svg class="arrow-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>';
  var info = { name: "circle-rotation", parameters: { task_duration_ms: { type: 1, default: 300000 } } };

  class P {
    constructor(j) { this.jsPsych = j; }
    trial(el, trial) {
      var self = this, circles = [], activeIdx = 0, rounds = 0, clicks = 0, start = performance.now(), rts = [];
      for (var i = 0; i < TOTAL; i++) circles.push(0);

      function rem() { return Math.max(0, trial.task_duration_ms - (performance.now() - start)); }
      function fmt(ms) { var s = Math.ceil(ms/1000), m = Math.floor(s/60); return m+":"+(s%60<10?"0":"")+(s%60); }

      function draw() {
        var r = rem(), pct = (r / trial.task_duration_ms) * 100;
        var h = '<div class="task-wrapper">';
        h += '<div style="display:flex;align-items:center;gap:12px;width:100%;max-width:360px"><div class="task-timer-bar"><div class="task-timer-fill" style="width:'+pct+'%"></div></div><span class="task-timer-text" id="t">'+fmt(r)+'</span></div>';

        h += '<div class="circle-grid">';
        for (var i = 0; i < TOTAL; i++) {
          var c = circles[i], d = c >= CLICKS, a = i === activeIdx && !d, rot = c * 90;
          h += '<div class="circle-cell"><button class="circle-btn'+(a?' active':'')+'" data-i="'+i+'"'+(a?'':' disabled')+'><div class="disk '+(d?'done':a?'active':'inactive')+'"><div style="transform:rotate('+rot+'deg);transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1)">'+ARROW+'</div></div></button><span class="circle-label">'+(d?'✓':a?c+'/4':'')+'</span></div>';
        }
        h += '</div></div>';
        el.innerHTML = h;
        var b = el.querySelector('.circle-btn.active');
        if (b) b.addEventListener('click', click);
      }

      function click(e) {
        var i = parseInt(e.currentTarget.getAttribute('data-i'));
        if (i !== activeIdx) return;
        circles[i]++; clicks++;
        if (circles[i] >= CLICKS) {
          activeIdx++;
          if (activeIdx >= TOTAL) {
            rounds++; rts.push(Math.round(performance.now()-start));
            for (var j = 0; j < TOTAL; j++) circles[j] = 0;
            activeIdx = 0;
          }
        }
        draw();
      }

      var ended = false;
      function end() {
        if (ended) return;
        ended = true;
        clearInterval(iv);
        clearTimeout(safetyTimeout);
        self.jsPsych.finishTrial({ rounds_completed: rounds, total_clicks: clicks, total_time_ms: Math.round(performance.now()-start), round_timestamps_ms: JSON.stringify(rts) });
      }

      var iv = setInterval(function() {
        var r = rem(), te = el.querySelector('#t'), tb = el.querySelector('.task-timer-fill');
        if (te) te.textContent = fmt(r);
        if (tb) tb.style.width = ((r/trial.task_duration_ms)*100)+'%';
        if (r <= 0) end();
      }, 1000);
      var safetyTimeout = setTimeout(function(){ end(); }, trial.task_duration_ms + 500);
      draw();
    }
  }
  P.info = info;
  return P;
})();


/* ═══════════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════════ */
var L5 = ["1 – Почти или совсем нет", "2 – Немного", "3 – Умеренно", "4 – Значительно", "5 – Очень сильно"];
var L7 = ["1 – полностью не согласен", "2 – не согласен", "3 – скорее не согласен", "4 – нечто среднее", "5 – скорее согласен", "6 – согласен", "7 – полностью согласен"];
var L5sc = ["1 – совершенно не согласен", "2 – скорее не согласен", "3 – нечто среднее", "4 – скорее согласен", "5 – совершенно согласен"];

function likertQ(prompt, labels, name) {
  return { prompt: prompt, labels: labels, required: true, name: name };
}


/* ═══════════════════════════════════════════════════════════════
   EXPERIMENT TIMELINE
   ═══════════════════════════════════════════════════════════════ */
var jsPsych = initJsPsych();
var subject_id = jsPsych.randomization.randomID(10);
var filename = subject_id + ".csv";


/* ── PAGE 1: Consent ── */
var page1 = {
  type: jsPsychHtmlButtonResponse,
  stimulus:
    '<div class="page">' +
    '<h1>Уважаемый участник!</h1>' +
    '<p>Спасибо за Ваш вклад в наше исследование и интерес к нему! Исследование посвящено связи между определенными личностными особенностями и выполнением задач на внимание.</p>' +
    '<p><strong>Что вас ждёт:</strong></p>' +
    '<ul><li>Краткий опросник (около 2 минут).</li><li>Компьютерное задание на внимание (5 минут).</li><li>Ещё несколько небольших опросников (7–8 минут).</li></ul>' +
    '<p><strong>Важные условия:</strong></p>' +
    '<p>Пожалуйста, выделите 15–20 минут непрерывного времени, чтобы пройти исследование без перерыва.</p>' +
    '<p>Перед началом отключите уведомления на телефоне и компьютере. Выполняйте задание в тихом месте, где Вас никто не побеспокоит. Все ответы анонимны и будут использоваться только в обобщённом виде.</p>' +
    '<p>Вы можете в любой момент прервать участие, закрыв страницу.</p>' +
    '<p>Если Вам меньше 18 лет, у Вас есть диагностированный СДВГ, неврологические или психиатрические заболевания, пожалуйста, воздержитесь от участия.</p>' +
    '<p>После завершения исследования Вы увидите краткую информацию о его целях.</p>' +
    '<p>Если Вас заинтересуют результаты исследования, Вы можете оставить в конце адрес своей электронной почты — мы проинформируем Вас о полученных результатах после завершения исследования.</p>' +
    '<p class="note">Нажмите «Далее», если Вы согласны принять участие.</p>' +
    '</div>',
  choices: ['Далее'],
  data: { trial_label: 'consent' }
};


/* ── PAGE 2: Demographics ── */
var page2 = {
  type: jsPsychSurveyHtmlForm,
  preamble: '<div class="page"><h1>Демографические данные</h1></div>',
  html:
    '<div style="max-width:500px;margin:0 auto;font-family:Fraunces,serif;font-size:16px;">' +
    '<p style="margin-bottom:8px;"><strong>Укажите Ваш пол:</strong></p>' +
    '<label style="display:block;margin:4px 0;"><input type="radio" name="gender" value="female" required> Женщина</label>' +
    '<label style="display:block;margin:4px 0;"><input type="radio" name="gender" value="male"> Мужчина</label>' +
    '<label style="display:block;margin:4px 0;"><input type="radio" name="gender" value="prefer_not"> Предпочитаю не указывать</label>' +
    '<p style="margin-top:20px;margin-bottom:8px;"><strong>Укажите Ваш возраст:</strong></p>' +
    '<input type="number" name="age" min="18" max="99" required placeholder="Возраст">' +
    '</div>',
  button_label: 'Далее',
  data: { trial_label: 'demographics' }
};


/* ── PAGE 3: PANAS PRE ── */
var panas_pre_items = [
  "увлеченный", "подавленный", "радостный", "расстроенный", "полный сил",
  "виноватый", "испуганный", "злой", "заинтересованный", "уверенный",
  "раздраженный", "сосредоточенный", "стыдящийся", "вдохновленный", "нервный",
  "решительный", "внимательный", "беспокойный", "бодрый", "тревожный", "скучающий"
];

var page3 = {
  type: jsPsychSurveyLikert,
  preamble: '<div class="page"><p>Этот опросник состоит из перечня прилагательных, которые описывают различные чувства и эмоции. Прочитайте каждое прилагательное и отметьте, в какой мере Вы чувствуете себя так <strong>сейчас</strong> (в настоящий момент).</p></div>',
  questions: panas_pre_items.map(function(item, i) {
    return likertQ(item, L5, 'panas_pre_' + (i+1));
  }),
  button_label: 'Далее',
  data: { trial_label: 'panas_pre' }
};


/* ── PAGE 4: Task instructions ── */
var page4 = {
  type: jsPsychHtmlButtonResponse,
  stimulus:
    '<div class="page">' +
    '<h1>Инструкция к заданию</h1>' +
    '<p>На экране вы увидите восемь синих дисков (кругов), расположенных в два ряда по четыре. На каждом диске есть стрелка, указывающая от центра к краю.</p>' +
    '<p>В начале задания первый диск будет подсвечен.</p>' +
    '<p>Ваша задача — кликать на подсвеченный диск. Каждый клик поворачивает стрелку на четверть оборота по часовой стрелке.</p>' +
    '<p>Когда стрелка на текущем диске совершит полный оборот (после четырёх кликов), подсветка автоматически перейдёт к следующему диску. Продолжайте кликать на подсвеченные диски, пока задание не завершится.</p>' +
    '<p>Пожалуйста, работайте, не отвлекаясь. Задание займёт 5 минут.</p>' +
    '<p class="note">Нажмите «Далее», чтобы перейти к заданию.</p>' +
    '</div>',
  choices: ['Далее'],
  data: { trial_label: 'task_instructions' }
};


/* ── PAGE 5: Circle task ── */
var page5 = {
  type: jsPsychCircleRotation,
  task_duration_ms: TASK_DURATION_MS,
  data: { trial_label: 'circle_task' }
};


/* ── PAGE 6: PANAS POST ── */
var panas_post_items = [
  "скучающий", "виноватый", "внимательный", "беспокойный", "уверенный",
  "бодрый", "подавленный", "стыдящийся", "раздраженный", "решительный",
  "расстроенный", "увлеченный", "злой", "вдохновленный", "сосредоточенный",
  "испуганный", "заинтересованный", "тревожный", "нервный", "радостный", "полный сил"
];

var page6 = {
  type: jsPsychSurveyLikert,
  preamble: '<div class="page"><p>Прочитайте, пожалуйста, каждое прилагательное и отметьте, в какой мере Вы чувствовали себя <strong> ВО ВРЕМЯ ВЫПОЛНЕНИЯ ЗАДАНИЯ</strong>.</p></div>',
  questions: panas_post_items.map(function(item, i) {
    return likertQ(item, L5, 'panas_post_' + (i+1));
  }),
  button_label: 'Далее',
  data: { trial_label: 'panas_post' }
};


/* ── PAGE 7: Boredom Proneness (8 items, 7-point) ── */
var boredom_items = [
  "Я часто бываю растерянным и не знаю, что делать.",
  "Мне сложно себя чем-нибудь развлечь.",
  "Многое из того, что мне приходится делать, однообразно и уныло.",
  "Мне нужен более серьезный стимул для каких-либо действий, чем большинству людей.",
  "Мне не нравится большинство вещей, которыми я занимаюсь.",
  "В большинстве ситуаций мне трудно обнаружить что-нибудь интересное для себя.",
  "Большую часть времени я просто сижу без дела.",
  "Если я не занят чем-нибудь захватывающим, даже опасным, то чувствую себя неживым."
];

var page7 = {
  type: jsPsychSurveyLikert,
  preamble: '<div class="page"><p>Оцените, пожалуйста, каждое утверждение по шкале от 1 («полностью не согласен») до 7 («полностью согласен»).</p></div>',

};

var agency_items = [
  "Я полностью контролирую все, что я делаю.",
  "Я всего лишь инструмент в чьих-то руках.",
  "Мои действия просто случаются без всякого намерения с моей стороны.",
  "Я — автор своих поступков.",
  "Последствия моих действий логически не связаны с самими моими действиями.",
  "Мои движения автоматические: мое тело просто делает их и все.",
  "Последствия моих поступков обычно удивляют меня.",
  "Все, что я делаю, я делаю по своей свободной воле.",
  "Решение, как и когда действовать, принимаю я.",

  "Если Вы внимательно прочитали этот вопрос, в ответе выберите вариант 4 – нечто среднее."
];
